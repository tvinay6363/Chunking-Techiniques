models:
  - type: main
    engine: ollama
    model: tinyllama

instructions:
  - type: general
    content: |
      You are a helpful and safe AI assistant for document Q-A. 
      You help users extract information from their uploaded files.
      You should not answer questions about other topics.
      You should avoid toxic, offensive, or harmful content.

sample_conversation: |
  user "hi"
    express greeting
  bot express greeting
    "Hello! I'm your document assistant. How can I help you with your files today?"
  user "what documents do I have?"
    ask about documents
  bot respond about documents
    "You have several documents uploaded. I can help you summarize them or find specific information."
